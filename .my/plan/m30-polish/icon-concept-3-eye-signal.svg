<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A2744"/>
      <stop offset="100%" stop-color="#0F1B30"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg3)"/>

  <!-- Stylized eye shape -->
  <!-- Outer eye outline (almond/leaf shape) -->
  <path d="M76,260 Q256,120 436,260 Q256,400 76,260Z"
        fill="none" stroke="#00BCD4" stroke-width="14" stroke-linejoin="round"/>

  <!-- Iris circle -->
  <circle cx="256" cy="260" r="62" fill="none" stroke="#00BCD4" stroke-width="12"/>

  <!-- Pupil -->
  <circle cx="256" cy="260" r="24" fill="#00BCD4"/>

  <!-- Signal arcs emanating from the eye (top-right) -->
  <g fill="none" stroke="#00BCD4" stroke-linecap="round">
    <!-- Arc 1 (closest) -->
    <path d="M340,170 A80,80 0 0,1 380,210"
          stroke-width="10" opacity="0.9"/>
    <!-- Arc 2 -->
    <path d="M358,140 A120,120 0 0,1 418,200"
          stroke-width="8" opacity="0.6"/>
    <!-- Arc 3 (farthest) -->
    <path d="M376,112 A160,160 0 0,1 452,188"
          stroke-width="6" opacity="0.35"/>
  </g>

  <!-- Subtle highlight on iris -->
  <circle cx="240" cy="246" r="8" fill="#FFFFFF" opacity="0.35"/>
</svg>
