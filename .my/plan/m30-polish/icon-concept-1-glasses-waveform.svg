<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A2744"/>
      <stop offset="100%" stop-color="#0F1B30"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg1)"/>

  <!-- Glasses frame - front view -->
  <!-- Left lens -->
  <rect x="88" y="170" width="140" height="110" rx="28" ry="28"
        fill="none" stroke="#00BCD4" stroke-width="14" stroke-linecap="round"/>
  <!-- Right lens -->
  <rect x="284" y="170" width="140" height="110" rx="28" ry="28"
        fill="none" stroke="#00BCD4" stroke-width="14" stroke-linecap="round"/>
  <!-- Bridge -->
  <path d="M228 215 Q256 195 284 215"
        fill="none" stroke="#00BCD4" stroke-width="14" stroke-linecap="round"/>
  <!-- Left arm hint -->
  <line x1="88" y1="215" x2="56" y2="205"
        stroke="#00BCD4" stroke-width="14" stroke-linecap="round"/>
  <!-- Right arm hint -->
  <line x1="424" y1="215" x2="456" y2="205"
        stroke="#00BCD4" stroke-width="14" stroke-linecap="round"/>

  <!-- Audio waveform bars centered below glasses -->
  <g fill="#00BCD4" opacity="0.85">
    <rect x="176" y="330" width="12" height="52" rx="6" ry="6"/>
    <rect x="200" y="316" width="12" height="80" rx="6" ry="6"/>
    <rect x="224" y="326" width="12" height="60" rx="6" ry="6"/>
    <rect x="248" y="308" width="12" height="96" rx="6" ry="6"/>
    <rect x="272" y="322" width="12" height="68" rx="6" ry="6"/>
    <rect x="296" y="312" width="12" height="88" rx="6" ry="6"/>
    <rect x="320" y="330" width="12" height="52" rx="6" ry="6"/>
  </g>
</svg>
